<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 27 — RGPD & Observabilite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 27 — RGPD & Observabilite</h1>
    <p class="subtitle">PII, anonymisation, retention, consentement, DPIA, conformite CNIL</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — PII dans les logs",
        text: "Parmi ces donnees presentes dans un log applicatif, laquelle n'est PAS consideree comme une donnee personnelle au sens du RGPD ?",
        code: "logger.info('Request processed', {\n  statusCode: 200,\n  ip: '192.168.1.42',\n  userAgent: 'Mozilla/5.0 (iPhone; ...)',\n  responseTimeMs: 142,\n  requestId: 'req_abc123'\n});",
        options: [
          "L'adresse IP (192.168.1.42) — c'est une donnee technique, pas personnelle",
          "Le User-Agent — car la combinaison OS + navigateur + version peut identifier un appareil unique",
          "Le temps de reponse (142ms) — c'est une metrique technique sans lien avec une personne physique identifiable",
          "Le requestId (req_abc123) — car il peut etre correle a un utilisateur via les logs"
        ],
        answer: 2,
        explanation: "Le temps de reponse (responseTimeMs: 142) est une metrique purement technique qui ne permet pas d'identifier directement ou indirectement une personne physique. En revanche, l'adresse IP est une donnee personnelle (arret Breyer, CJUE 2016), le User-Agent peut contribuer au fingerprinting (combinaison identifiante), et un requestId lie a un userId est une donnee pseudonyme donc personnelle."
      },
      {
        label: "Question 2 — Techniques d'anonymisation",
        text: "Quelle est la difference fondamentale entre le hachage (hashing) et la tokenisation pour l'anonymisation des PII dans les logs ?",
        code: null,
        options: [
          "Le hachage est reversible avec la cle secrete, la tokenisation est irreversible",
          "Le hachage est irreversible et deterministe (meme entree = meme hash), la tokenisation utilise un mapping reversible stocke dans un vault securise",
          "Le hachage et la tokenisation sont identiques, seul le nom differe selon le contexte",
          "Le hachage est plus lent car il utilise des algorithmes cryptographiques, la tokenisation est instantanee"
        ],
        answer: 1,
        explanation: "Le hachage (SHA-256 avec sel) produit une valeur irreversible et deterministe : hashPII('alice@example.com', salt) donnera toujours le meme hash, ce qui permet de correler les logs sans connaitre l'email. La tokenisation remplace la PII par un token aleatoire (tok_abc123) et stocke le mapping token <-> PII dans un vault securise. Elle est reversible par les personnes autorisees (DPO, support). Pour le droit a l'effacement, on supprime le mapping du vault."
      },
      {
        label: "Question 3 — Retention des donnees",
        text: "Selon le RGPD (Article 5), quelle est la regle concernant la duree de conservation des logs applicatifs contenant des donnees personnelles ?",
        code: null,
        options: [
          "Le RGPD fixe une duree maximale de 90 jours pour tous les types de logs",
          "Les logs doivent etre conserves indefiniment pour permettre les audits de securite",
          "Les donnees ne doivent pas etre conservees plus longtemps que necessaire pour les finalites du traitement, et chaque type de donnee doit avoir une duree de retention documentee et justifiee",
          "La duree de retention est libre tant que l'entreprise a signe un DPA avec son hebergeur"
        ],
        answer: 2,
        explanation: "L'Article 5(1)(e) du RGPD impose la limitation de la conservation : les donnees personnelles doivent etre conservees sous une forme permettant l'identification des personnes pendant une duree n'excedant pas celle necessaire aux finalites. En pratique, les logs applicatifs (debug) sont generalement conserves 30-90 jours, les logs de securite 1 an (obligation LCEN), les traces 7-30 jours. Chaque duree doit etre documentee avec sa base legale."
      },
      {
        label: "Question 4 — Consentement et analytics",
        text: "Dans quel cas Matomo (auto-heberge) peut-il etre utilise SANS consentement prealable de l'utilisateur, selon les recommandations de la CNIL ?",
        code: null,
        options: [
          "Toujours, car Matomo est un logiciel open-source et donc automatiquement conforme au RGPD",
          "Jamais, le consentement est obligatoire pour toute forme de mesure d'audience",
          "Quand Matomo est configure sans cookies, sans fingerprinting, avec IP anonymisee, heberge dans l'UE, et que les donnees ne sont pas croisees avec d'autres traitements (exemption CNIL pour la mesure d'audience stricte)",
          "Uniquement si l'utilisateur est informe par une banniere, meme sans action de sa part"
        ],
        answer: 2,
        explanation: "La CNIL accorde une exemption de consentement pour la mesure d'audience stricte si toutes les conditions sont remplies : pas de cookies (disableCookies), pas de fingerprinting, IP anonymisee (2 derniers octets), hebergement UE, donnees non croisees avec d'autres traitements, cookie limite a 13 mois, donnees conservees max 25 mois. L'utilisateur doit etre informe et pouvoir s'opposer. Matomo auto-heberge et correctement configure est l'un des rares outils a etre eligible a cette exemption."
      },
      {
        label: "Question 5 — Breach notification",
        text: "En cas de violation de donnees personnelles (ex: un dashboard Grafana expose publiquement avec des emails utilisateurs), quel est le delai legal pour notifier la CNIL ?",
        code: null,
        options: [
          "24 heures apres la detection, sans exception",
          "72 heures apres en avoir eu connaissance, meme si l'evaluation n'est pas terminee (notification complementaire possible ensuite)",
          "30 jours, le meme delai que pour repondre aux demandes de droit d'acces",
          "Il n'y a pas de delai impose, il suffit de notifier dans un delai raisonnable"
        ],
        answer: 1,
        explanation: "L'Article 33 du RGPD impose une notification a l'autorite de controle (CNIL en France) dans les 72 heures apres avoir eu connaissance de la violation. Si l'evaluation n'est pas terminee, une notification initiale doit etre faite dans les 72h, avec une notification complementaire ensuite. Si la violation engendre un risque eleve pour les personnes (Article 34), celles-ci doivent egalement etre notifiees. Le formulaire est disponible sur teleservice.cnil.fr."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion]; const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked'); if (!selected) return;
      const val = parseInt(selected.value); const q = questions[currentQuestion];
      const fb = document.getElementById('feedback'); const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
