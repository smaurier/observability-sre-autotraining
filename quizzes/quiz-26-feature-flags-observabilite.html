<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 26 — Feature Flags et Observabilite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 26 — Feature Flags et Observabilite</h1>
    <p class="subtitle">rollout progressif, kill switch, canary, A/B testing</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Lors d'un <strong>rollout progressif</strong>, pourquoi commence-t-on generalement par activer la feature pour 1 % puis 5 %, 25 %, 50 % et enfin 100 % des utilisateurs ?",
        options: [
          "Pour respecter une obligation legale de deploiement graduel",
          "Pour limiter le blast radius en cas de bug : si un probleme survient, seul un faible pourcentage d'utilisateurs est impacte, et les metriques permettent de detecter la regression avant d'elargir",
          "Parce que les serveurs ne peuvent pas gerer 100 % du trafic immediatement",
          "Pour que les equipes marketing puissent preparer leurs communications a chaque palier"
        ],
        answer: 1,
        explanation: "Le rollout progressif est une strategie de <strong>reduction du blast radius</strong>. A chaque palier, on observe les metriques cles (taux d'erreur, latence, taux de conversion). Si une regression est detectee, on peut arreter le rollout ou rollback avant que la majorite des utilisateurs ne soit affectee."
      },
      {
        label: "Question 2",
        text: "Qu'est-ce qu'un <strong>kill switch</strong> et quelle metrique declenche typiquement son activation ?",
        options: [
          "Un bouton physique sur le serveur qui coupe l'alimentation electrique",
          "Un feature flag configure pour desactiver immediatement une fonctionnalite quand une metrique depasse un seuil critique (ex : taux d'erreur > 5 %, latence P99 > 3s)",
          "Un script qui redemarre tous les conteneurs Docker en cas de panne",
          "Un mecanisme de rollback automatique du code source vers la version precedente"
        ],
        answer: 1,
        explanation: "Un <strong>kill switch</strong> est un feature flag specialement concu pour pouvoir desactiver instantanement une fonctionnalite sans redeployer. Il peut etre declenche manuellement par un operateur ou automatiquement par une regle d'alerte (ex : taux d'erreur 5xx > 5 %, latence P99 depasse 3 secondes). C'est un filet de securite essentiel pour les deploiements en production."
      },
      {
        label: "Question 3",
        text: "Comment le <strong>hachage deterministe</strong> (consistent hashing) est-il utilise pour assigner les utilisateurs a un groupe de feature flag ?",
        options: [
          "On tire un nombre aleatoire a chaque requete pour decider si l'utilisateur voit la feature",
          "On calcule un hash de l'identifiant utilisateur (ex : hash(userId) % 100) pour obtenir un nombre stable entre 0 et 99, garantissant que le meme utilisateur voit toujours la meme variante",
          "On utilise l'adresse IP de l'utilisateur comme critere unique d'assignation",
          "On assigne les utilisateurs par ordre alphabetique de leur nom"
        ],
        answer: 1,
        explanation: "Le hachage deterministe garantit la <strong>coherence de l'experience</strong> : <code>hash(userId + flagName) % 100</code> donne toujours le meme resultat pour un utilisateur donne. Si le rollout est a 25 %, les utilisateurs dont le hash est entre 0 et 24 voient la feature. Un nombre aleatoire donnerait une experience incoherente entre les requetes."
      },
      {
        label: "Question 4",
        text: "Pourquoi est-il important d'inclure le <strong>nom du feature flag actif</strong> comme attribut dans les spans et metriques d'observabilite ?",
        options: [
          "Pour respecter les conventions de nommage OpenTelemetry obligatoires",
          "Pour pouvoir correler les variations de performance ou d'erreurs avec l'activation d'un flag specifique et identifier rapidement si une feature cause une regression",
          "Pour que le feature flag soit visible dans l'interface utilisateur du site web",
          "Pour augmenter le nombre de series temporelles et avoir plus de donnees"
        ],
        answer: 1,
        explanation: "En ajoutant le flag comme attribut (ex : <code>feature_flag.new_checkout=true</code>), on peut <strong>filtrer les metriques par variante</strong> : comparer le taux d'erreur des utilisateurs avec le flag actif vs inactif. Sans cette correlation, il est impossible de savoir si une degradation observee est causee par la nouvelle feature ou par un autre facteur."
      },
      {
        label: "Question 5",
        text: "Dans un deploiement <strong>canary</strong>, quelles metriques compare-t-on entre le groupe canary et le groupe baseline pour valider la promotion ?",
        options: [
          "Uniquement le nombre de lignes de code modifiees",
          "Le taux d'erreur (error rate), la latence (P50, P95, P99) et les metriques metier (taux de conversion, abandon) entre le canary et le baseline",
          "La consommation electrique des serveurs canary vs baseline",
          "Le nombre de commits Git sur la branche canary"
        ],
        answer: 1,
        explanation: "Le deploiement canary compare les <strong>metriques techniques</strong> (taux d'erreur, latence par percentile) et les <strong>metriques metier</strong> (conversion, funnel) entre le canary (nouvelle version) et le baseline (version actuelle). Si les metriques du canary sont equivalentes ou meilleures, on promeut progressivement. Sinon, on rollback automatiquement."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
