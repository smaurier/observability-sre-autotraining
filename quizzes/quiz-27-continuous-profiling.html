<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Quiz — Continuous Profiling</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}.container{max-width:800px;margin:0 auto}h1{text-align:center;margin-bottom:.5rem;font-size:1.8rem;color:#fff}.subtitle{text-align:center;color:#8892b0;margin-bottom:2rem;font-size:1rem}.progress-bar-container{background:#0d1117;border-radius:10px;height:14px;margin-bottom:2rem;overflow:hidden}.progress-bar{background:linear-gradient(90deg,#0d6efd,#4dabf7);height:100%;width:0%;border-radius:10px;transition:width .4s ease}.progress-text{text-align:center;color:#8892b0;margin-bottom:1rem;font-size:.9rem}.card{background:#16213e;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.3)}.question-label{font-size:.85rem;color:#4dabf7;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}.question-text{font-size:1.15rem;margin-bottom:1.2rem;line-height:1.5;color:#fff}pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto;font-size:.95rem}code{font-family:'Consolas','Fira Code','Courier New',monospace;color:#c9d1d9}.options{list-style:none}.options li{margin-bottom:.5rem}.options label{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:#0d1117;border:2px solid #30363d;border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;font-size:1rem}.options label:hover{border-color:#4dabf7;background:#1c2a4a}.options input[type=radio]{accent-color:#0d6efd;width:18px;height:18px;flex-shrink:0}.btn{display:inline-block;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#3b82f6}.btn-primary:disabled{background:#374151;cursor:not-allowed}.btn-restart{background:#238636;color:#fff;margin-top:1rem;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}.btn-restart:hover{background:#2ea043}.feedback{margin-top:1rem;padding:1rem 1.2rem;border-radius:8px;font-size:.95rem;line-height:1.5;display:none}.feedback.correct{background:#0f5132;border:1px solid #198754;color:#d1fae5;display:block}.feedback.wrong{background:#842029;border:1px solid #dc3545;color:#fdd;display:block}.score-card{text-align:center;padding:3rem 2rem}.score-card .score{font-size:3rem;font-weight:700;color:#4dabf7;margin-bottom:.5rem}.score-card .score-label{font-size:1.2rem;color:#8892b0;margin-bottom:1.5rem}.hidden{display:none}</style></head><body><div class="container"><h1>Quiz — Continuous Profiling</h1><p class="subtitle">Module 27 — Comprendre ou va le temps CPU et la memoire</p><div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div><p class="progress-text" id="progressText">Question 1 / 5</p><div id="quizContainer"></div><div id="scoreContainer" class="card score-card hidden"></div></div><script>const questions=[{label:"Question 1 — Les trois piliers",text:"Les metriques disent « quoi », le tracing dit « ou ». Que revele le profiling ?",options:["Quand le probleme s'est produit","Combien d'utilisateurs sont impactes","Pourquoi — quelle fonction precise est responsable de la consommation de ressources","Quel service a declenche l'alerte"],answer:2,explanation:"Les metriques indiquent le symptome (CPU a 80%), le tracing localise le probleme (la requete /api/users est lente), et le profiling identifie la cause racine : quelle fonction precise consomme les ressources (ex: JSON.parse consomme 40% du CPU)."},{label:"Question 2 — Types de profiling",text:"Vos requetes API sont lentes (2 secondes) mais le CPU reste a 15%. Quel type de profiling est le plus adapte ?",options:["CPU profiling","Memory (heap) profiling","Wall-clock profiling","Aucun, le profiling n'est pas utile ici"],answer:2,explanation:"Le wall-clock profiling mesure le temps reel ecoule, y compris le temps d'attente I/O (BDD, reseau, disque). Quand les requetes sont lentes mais le CPU n'est pas eleve, le probleme est dans l'I/O — exactement ce que le CPU profiling ignorerait."},{label:"Question 3 — Flame graph",text:"Comment lit-on un flame graph pour identifier les cibles d'optimisation ?",options:["On commence par les barres les plus etroites en haut du graphe","On commence par les barres les plus LARGES — elles representent les fonctions qui consomment le plus de temps","On lit uniquement la barre tout en bas du graphe","On cherche les barres de couleur rouge uniquement"],answer:1,explanation:"Dans un flame graph, la largeur d'une barre est proportionnelle au temps consomme par la fonction. On commence par les barres les plus larges pour identifier les cibles d'optimisation, puis on remonte dans la pile d'appels pour comprendre qui appelle qui."},{label:"Question 4 — Diff flame graph",text:"Apres un deploiement, vous comparez les profils avant/apres dans Pyroscope. Que signifie une barre rouge dans le diff flame graph ?",options:["La fonction a ete supprimee","La fonction consomme moins de CPU qu'avant (amelioration)","La fonction consomme plus de CPU qu'avant (regression de performance)","La fonction n'existait pas avant le deploiement"],answer:2,explanation:"Dans un diff flame graph : rouge = regression (la fonction consomme plus de ressources qu'avant), vert = amelioration (la fonction consomme moins), gris = pas de changement. C'est un outil essentiel pour detecter les regressions de performance apres un deploiement."},{label:"Question 5 — Continuous profiling en production",text:"Quel est l'overhead typique du CPU sampling en continuous profiling, et pourquoi est-ce important ?",options:["Environ 20-30% — c'est pourquoi on ne l'active qu'en staging","Environ 5-10% — acceptable uniquement en pre-production","Moins de 1% — ce qui permet de l'activer en permanence en production sur le trafic reel","Exactement 0% — le profiling n'a aucun impact"],answer:2,explanation:"Le CPU sampling en continuous profiling a un overhead inferieur a 1%, ce qui permet de l'activer 24h/24 en production. C'est fondamental car les vrais problemes de performance apparaissent avec le trafic reel, pas en environnement de dev."}];let currentQuestion=0,score=0,answered=false;function renderQuestion(){const q=questions[currentQuestion],total=questions.length;document.getElementById('progressBar').style.width=((currentQuestion/total)*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} / ${total}`;let html=`<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;if(q.code)html+=`<pre><code>${q.code}</code></pre>`;html+=`<ul class="options">`;q.options.forEach((opt,i)=>{html+=`<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;});html+=`</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizContainer').innerHTML=html;document.querySelectorAll('input[name="q"]').forEach(r=>{r.addEventListener('change',()=>{document.getElementById('validateBtn').disabled=false;});});answered=false;}function validate(){if(answered){currentQuestion++;if(currentQuestion<questions.length)renderQuestion();else showScore();return;}answered=true;const selected=document.querySelector('input[name="q"]:checked');if(!selected)return;const val=parseInt(selected.value),q=questions[currentQuestion];const fb=document.getElementById('feedback'),btn=document.getElementById('validateBtn');document.querySelectorAll('input[name="q"]').forEach(r=>r.disabled=true);if(val===q.answer){score++;fb.className='feedback correct';fb.innerHTML=`<strong>Correct !</strong> ${q.explanation}`;}else{fb.className='feedback wrong';fb.innerHTML=`<strong>Incorrect.</strong> ${q.explanation}`;}btn.textContent=currentQuestion<questions.length-1?'Suivant':'Voir le score';}function showScore(){document.getElementById('quizContainer').classList.add('hidden');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent='Termine !';const sc=document.getElementById('scoreContainer');sc.classList.remove('hidden');const pct=Math.round((score/questions.length)*100);let msg=pct===100?'Parfait !':pct>=60?'Bien joue !':'Continuez a reviser !';sc.innerHTML=`<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;}function restart(){currentQuestion=0;score=0;answered=false;document.getElementById('scoreContainer').classList.add('hidden');document.getElementById('quizContainer').classList.remove('hidden');renderQuestion();}renderQuestion();</script></body></html>
