<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 23 — ELK Stack & Kibana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 23 — ELK Stack & Kibana</h1>
    <p class="subtitle">Elasticsearch, Logstash, Kibana, KQL, ILM</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Composants ELK",
        text: "Quel est le role de chaque composant dans la stack ELK ?",
        code: null,
        options: [
          "Elasticsearch indexe et recherche les logs, Logstash les collecte et transforme, Kibana les visualise",
          "Elasticsearch visualise les logs, Logstash les stocke, Kibana les collecte",
          "Elasticsearch est un load balancer, Logstash un cache, Kibana un serveur web",
          "Les trois composants sont interchangeables et remplissent le meme role"
        ],
        answer: 0,
        explanation: "Dans la stack ELK : Elasticsearch est le moteur de recherche et d'indexation distribue qui stocke les donnees. Logstash est le pipeline de traitement qui collecte, transforme (parse, enrichit, filtre) et envoie les logs vers Elasticsearch. Kibana est l'interface de visualisation qui permet de creer des dashboards, explorer les donnees et gerer le cluster."
      },
      {
        label: "Question 2 — Grok patterns",
        text: "Que fait ce filtre grok dans une configuration Logstash ?",
        code: "filter {\n  grok {\n    match => {\n      \"message\" => \"%{IP:client_ip} - %{USER:user} \\[%{HTTPDATE:timestamp}\\] \\\"%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}\\\" %{NUMBER:status:int} %{NUMBER:bytes:int}\"\n    }\n  }\n}",
        options: [
          "Il chiffre les logs avant de les envoyer a Elasticsearch",
          "Il parse une ligne de log au format Apache/Nginx en extrayant des champs structures (IP, user, timestamp, method, status, bytes)",
          "Il supprime les logs qui ne correspondent pas au pattern defini",
          "Il genere des logs synthetiques pour tester le pipeline"
        ],
        answer: 1,
        explanation: "Le filtre grok utilise des patterns nommes (comme %{IP:client_ip}) pour parser des lignes de log non structurees en champs structures. Ici, il decompose une ligne de log Apache/Nginx en champs exploitables : client_ip, user, timestamp, method, request, http_version, status et bytes. Les suffixes :int convertissent les valeurs en entiers."
      },
      {
        label: "Question 3 — ILM (Index Lifecycle Management)",
        text: "Qu'est-ce que l'ILM et l'architecture hot-warm-cold dans Elasticsearch ?",
        code: null,
        options: [
          "C'est un systeme de backup qui copie les index sur trois serveurs differents",
          "C'est une strategie de gestion du cycle de vie des index qui deplace automatiquement les donnees entre des noeuds performants (hot), economiques (warm) et d'archivage (cold) selon leur age",
          "C'est un algorithme de tri qui classe les logs par temperature de criticite",
          "C'est une fonctionnalite exclusive a Kibana pour coloriser les dashboards"
        ],
        answer: 1,
        explanation: "L'ILM (Index Lifecycle Management) automatise la gestion des index selon des phases : Hot (donnees recentes, noeuds SSD rapides, ecritures actives), Warm (donnees moins accedees, noeuds moins couteux, lecture seule), Cold (donnees rarement accedees, stockage economique), Delete (suppression apres retention). Cela optimise les couts tout en gardant les donnees recentes performantes."
      },
      {
        label: "Question 4 — KQL",
        text: "Que retourne cette requete KQL (Kibana Query Language) dans Kibana ?",
        code: "status >= 500 and http.request.method: \"POST\" and not url.path: \"/health\"",
        options: [
          "Tous les logs avec un statut inferieur a 500 sur les requetes GET",
          "Tous les logs avec un statut HTTP >= 500, uniquement pour les requetes POST, en excluant le endpoint /health",
          "Tous les logs contenant le mot 'POST' dans le corps de la reponse",
          "Uniquement les logs du endpoint /health avec un statut 500"
        ],
        answer: 1,
        explanation: "KQL (Kibana Query Language) est le langage de requete de Kibana. Cette requete combine trois conditions : status >= 500 (erreurs serveur), http.request.method: \"POST\" (uniquement les requetes POST), et not url.path: \"/health\" (exclut le health check). C'est une requete typique pour investiguer les erreurs serveur sur les endpoints d'ecriture."
      },
      {
        label: "Question 5 — Shards et Replicas",
        text: "Quel est le role des shards et des replicas dans Elasticsearch ?",
        code: null,
        options: [
          "Les shards sont des copies de sauvegarde et les replicas servent a distribuer les requetes",
          "Les shards divisent un index en morceaux distribues sur plusieurs noeuds (scalabilite horizontale), les replicas sont des copies de ces shards (haute disponibilite et performance de lecture)",
          "Les shards et replicas sont des synonymes designant les partitions d'un index",
          "Les shards gerent l'authentification et les replicas gerent l'autorisation"
        ],
        answer: 1,
        explanation: "Un shard (primary shard) est une partition d'un index : diviser un index en N shards permet de distribuer les donnees et les requetes sur plusieurs noeuds (scalabilite horizontale). Un replica est une copie d'un primary shard stockee sur un noeud different : il assure la haute disponibilite (si un noeud tombe, les replicas prennent le relais) et ameliore les performances de lecture en repartissant la charge."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion]; const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked'); if (!selected) return;
      const val = parseInt(selected.value); const q = questions[currentQuestion];
      const fb = document.getElementById('feedback'); const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
