<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 24 — Honeycomb & Observabilite Avancee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 24 — Honeycomb & Observabilite Avancee</h1>
    <p class="subtitle">haute cardinalite, BubbleUp, SLOs, query builder, OpenTelemetry</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Haute cardinalite",
        text: "Qu'est-ce que la haute cardinalite et pourquoi est-ce important en observabilite ?",
        code: null,
        options: [
          "La haute cardinalite designe un grand nombre de serveurs dans un cluster ; c'est important pour la redondance",
          "La haute cardinalite signifie qu'un attribut a un tres grand nombre de valeurs uniques (ex: user_id, request_id), ce qui permet d'investiguer des problemes specifiques a un utilisateur ou une requete",
          "La haute cardinalite est un defaut a eviter car elle rend les requetes impossibles",
          "La haute cardinalite designe la vitesse a laquelle les metriques sont collectees"
        ],
        answer: 1,
        explanation: "La haute cardinalite designe des champs avec beaucoup de valeurs uniques (user_id, session_id, request_id, endpoint). C'est crucial en observabilite car elle permet de poser des questions specifiques : 'pourquoi cet utilisateur precis a-t-il une latence elevee ?'. Les outils traditionnels (Prometheus) gerent mal la haute cardinalite, alors que Honeycomb est concu pour l'exploiter efficacement."
      },
      {
        label: "Question 2 — BubbleUp",
        text: "Que fait la fonctionnalite BubbleUp dans Honeycomb ?",
        code: null,
        options: [
          "Elle permet de faire remonter les alertes critiques en haut du dashboard",
          "Elle compare automatiquement les attributs des evenements dans une selection (ex: pic de latence) avec le reste du trafic, pour identifier les dimensions qui different significativement",
          "Elle trie les logs par ordre chronologique inverse",
          "Elle agrege toutes les metriques en une seule valeur composite"
        ],
        answer: 1,
        explanation: "BubbleUp est une fonctionnalite unique de Honeycomb qui, lorsqu'on selectionne une anomalie sur un graphique (ex: un pic de latence), compare automatiquement tous les attributs des evenements de cette selection avec ceux du trafic normal. Elle fait 'remonter' (bubble up) les dimensions qui different significativement, par exemple : 'les requetes lentes viennent toutes du datacenter eu-west-1 et utilisent le endpoint /api/search'."
      },
      {
        label: "Question 3 — Evenements vs Metriques",
        text: "Comment Honeycomb gere-t-il les donnees differemment des systemes de metriques traditionnels ?",
        code: null,
        options: [
          "Honeycomb stocke uniquement des moyennes pre-calculees comme Prometheus",
          "Honeycomb stocke des evenements bruts (wide events) avec de nombreux attributs, permettant des requetes ad-hoc sans pre-agregation, contrairement aux metriques traditionnelles qui pre-agregent les donnees",
          "Honeycomb ne stocke aucune donnee, il fait tout en temps reel en memoire",
          "Honeycomb utilise exactement le meme modele de donnees que Prometheus mais avec une interface differente"
        ],
        answer: 1,
        explanation: "Honeycomb utilise un modele de 'wide events' : chaque evenement contient des centaines d'attributs (user_id, endpoint, status, duration, build_id, etc.) stockes sous forme brute. On peut ensuite les requeter avec GROUP BY, HEATMAP, PERCENTILE sans avoir pre-defini les agregations. Les systemes de metriques traditionnels (Prometheus, StatsD) pre-agregent les donnees, ce qui limite les questions qu'on peut poser apres coup."
      },
      {
        label: "Question 4 — SLOs dans Honeycomb",
        text: "En quoi les SLOs (Service Level Objectives) dans Honeycomb different-ils des SLOs traditionnels ?",
        code: null,
        options: [
          "Honeycomb ne supporte pas les SLOs, il faut utiliser un outil externe",
          "Les SLOs Honeycomb sont bases sur des evenements reels et permettent de voir exactement quels evenements ont consomme le budget d'erreur, avec la possibilite de BubbleUp sur les violations",
          "Les SLOs Honeycomb sont identiques a ceux de Prometheus, seule l'interface change",
          "Les SLOs Honeycomb mesurent uniquement la disponibilite, pas la latence"
        ],
        answer: 1,
        explanation: "Les SLOs dans Honeycomb sont directement lies aux evenements bruts : quand le budget d'erreur se consume, on peut cliquer sur les violations et voir les evenements individuels qui ont echoue, puis utiliser BubbleUp pour comprendre pourquoi. Les SLOs traditionnels sont souvent bases sur des metriques agregees (taux d'erreur moyen) qui ne permettent pas cette investigation granulaire."
      },
      {
        label: "Question 5 — Honeycomb vs Grafana",
        text: "Dans quel scenario Honeycomb est-il generalement preferable a la stack Grafana (Prometheus + Loki + Tempo) ?",
        code: null,
        options: [
          "Quand on a besoin d'un outil gratuit et open-source pour une petite equipe",
          "Quand on a une architecture microservices complexe avec des problemes imprevisibles necessitant une exploration ad-hoc sur des donnees a haute cardinalite",
          "Quand on veut uniquement monitorer l'utilisation CPU et memoire de quelques serveurs",
          "Quand on prefere definir toutes les alertes et dashboards a l'avance sans jamais les modifier"
        ],
        answer: 1,
        explanation: "Honeycomb excelle dans les environnements microservices complexes ou les problemes sont imprevisibles : on ne sait pas a l'avance quelles questions poser. Sa capacite a gerer la haute cardinalite et les requetes ad-hoc sur des wide events permet d'investiguer des problemes nouveaux sans avoir pre-configure de dashboards. La stack Grafana est preferable quand le budget est limite (open-source), quand les patterns de monitoring sont bien connus, ou quand on a besoin d'un ecosysteme de plugins etendu."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion]; const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked'); if (!selected) return;
      const val = parseInt(selected.value); const q = questions[currentQuestion];
      const fb = document.getElementById('feedback'); const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
