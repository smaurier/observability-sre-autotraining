<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 22 — Sentry Error Tracking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 22 — Sentry Error Tracking</h1>
    <p class="subtitle">DSN, breadcrumbs, fingerprinting, PII scrubbing, alerting</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — DSN",
        text: "Qu'est-ce que le DSN (Data Source Name) dans Sentry ?",
        code: null,
        options: [
          "Un protocole reseau proprietaire utilise par Sentry pour compresser les erreurs",
          "L'identifiant unique de connexion qui indique au SDK Sentry ou envoyer les evenements (URL contenant le projet, la cle publique et le serveur)",
          "Le nom de la base de donnees ou Sentry stocke les erreurs en local",
          "Un fichier de configuration YAML requis dans chaque projet Sentry"
        ],
        answer: 1,
        explanation: "Le DSN (Data Source Name) est une URL unique fournie par Sentry qui contient toutes les informations necessaires pour que le SDK sache ou envoyer les evenements : le protocole, la cle publique (public key), le serveur Sentry et l'identifiant du projet. Il a le format : https://&lt;public_key&gt;@&lt;server&gt;/&lt;project_id&gt;."
      },
      {
        label: "Question 2 — Breadcrumbs",
        text: "A quoi servent les breadcrumbs (fil d'Ariane) dans Sentry ?",
        code: null,
        options: [
          "Ils permettent de naviguer entre les differents projets Sentry",
          "Ils enregistrent une trace chronologique des actions et evenements qui ont precede une erreur, facilitant la comprehension du contexte",
          "Ils definissent la hierarchie des equipes dans l'organisation Sentry",
          "Ils servent a compresser les stack traces pour reduire la bande passante"
        ],
        answer: 1,
        explanation: "Les breadcrumbs sont des traces chronologiques automatiquement collectees (clics utilisateur, requetes HTTP, logs console, navigations) qui montrent ce qui s'est passe avant qu'une erreur ne survienne. Ils sont essentiels pour reproduire et comprendre le contexte d'un bug. On peut aussi en ajouter manuellement avec Sentry.addBreadcrumb()."
      },
      {
        label: "Question 3 — Fingerprinting",
        text: "Dans quel cas utilise-t-on le fingerprinting personnalise dans Sentry ?",
        code: "Sentry.init({\n  beforeSend(event) {\n    // Grouper toutes les erreurs de timeout\n    // de l'API payment sous un meme issue\n    if (event.exception?.values?.[0]?.type === 'TimeoutError'\n        && event.request?.url?.includes('/api/payment')) {\n      event.fingerprint = ['payment-timeout'];\n    }\n    return event;\n  }\n});",
        options: [
          "Pour authentifier les utilisateurs avant d'envoyer les erreurs",
          "Pour chiffrer les donnees sensibles dans les rapports d'erreur",
          "Pour controler comment Sentry regroupe les erreurs en issues, en definissant des regles de groupement personnalisees",
          "Pour limiter le nombre d'erreurs envoyees par minute"
        ],
        answer: 2,
        explanation: "Le fingerprinting personnalise permet de controler comment Sentry regroupe les evenements en issues. Par defaut, Sentry utilise la stack trace pour grouper, mais parfois on veut regrouper differemment : par exemple, toutes les erreurs de timeout sur l'endpoint payment sous un meme issue, meme si les stack traces different. On definit event.fingerprint avec un tableau de chaines."
      },
      {
        label: "Question 4 — PII Scrubbing / RGPD",
        text: "Comment ce code protege-t-il les donnees personnelles (PII) conformement au RGPD ?",
        code: "Sentry.init({\n  dsn: 'https://examplePublicKey@o0.ingest.sentry.io/0',\n  beforeSend(event) {\n    // Supprimer les adresses email des donnees utilisateur\n    if (event.user?.email) {\n      delete event.user.email;\n    }\n    // Masquer les en-tetes d'autorisation\n    if (event.request?.headers?.['Authorization']) {\n      event.request.headers['Authorization'] = '[FILTERED]';\n    }\n    return event;\n  }\n});",
        options: [
          "Il chiffre toutes les donnees avant envoi avec une cle RSA",
          "Il utilise le callback beforeSend pour supprimer l'email utilisateur et masquer le header Authorization avant que l'evenement ne soit envoye a Sentry",
          "Il empeche Sentry de fonctionner si des donnees personnelles sont detectees",
          "Il envoie les donnees personnelles dans un serveur Sentry separe conforme RGPD"
        ],
        answer: 1,
        explanation: "Le callback beforeSend est appele juste avant l'envoi de chaque evenement a Sentry. C'est le dernier point d'interception cote client. Ici, il supprime l'email de l'utilisateur et remplace le header Authorization par '[FILTERED]'. C'est une pratique essentielle pour la conformite RGPD : ne jamais envoyer de donnees personnelles identifiables (PII) a un service tiers."
      },
      {
        label: "Question 5 — Sentry + OpenTelemetry",
        text: "Quel est l'interet d'integrer Sentry avec OpenTelemetry ?",
        code: null,
        options: [
          "OpenTelemetry remplace completement Sentry pour le tracking d'erreurs",
          "L'integration permet de correler les erreurs Sentry avec les traces distribuees OpenTelemetry, offrant une vue complete du parcours d'une requete a travers les microservices",
          "OpenTelemetry est necessaire pour que Sentry puisse envoyer des emails d'alerte",
          "L'integration sert uniquement a reduire les couts de Sentry en compressant les donnees"
        ],
        answer: 1,
        explanation: "L'integration Sentry + OpenTelemetry permet de lier les erreurs capturees par Sentry aux traces distribuees collectees par OpenTelemetry. Ainsi, quand une erreur survient, on peut voir l'ensemble du parcours de la requete a travers les differents microservices (spans), identifier ou la latence se situe, et comprendre le contexte complet de l'erreur dans l'architecture distribuee."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion]; const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked'); if (!selected) return;
      const val = parseInt(selected.value); const q = questions[currentQuestion];
      const fb = document.getElementById('feedback'); const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
